// Tolerant Firebase config parser
function parseFirebaseConfig(raw) {
  if (!raw) return null;
  let str = raw.trim();
  str = str.replace(/^(const|var|let)\s+\w+\s*=\s*/, "");
  str = str.replace(/;$/, "").trim();
  try {
    return JSON.parse(str);
  } catch (_) {}
  try {
    const result = new Function("return " + str)();
    if (result && typeof result === "object") return result;
  } catch (_) {}
  return null;
}

// ─── Mini Pie Chart (pure SVG) ───────────────────────────────────────────────
function PieChart({ data, size=160 }) {
  const total = data.reduce((s,d)=>s+d.value, 0);
  if (!total) return null;

  const cx = size/2, cy = size/2, r = size*0.38, ir = size*0.24;
  let angle = -Math.PI/2;
  const slices = data.map(d => {
    const pct = d.value / total;
    const sweep = pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    angle += sweep;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    const xi1 = cx + ir * Math.cos(angle);
    const yi1 = cy + ir * Math.sin(angle);
    angle -= sweep;
    const xi2 = cx + ir * Math.cos(angle);
    const yi2 = cy + ir * Math.sin(angle);
    angle += sweep;
    const large = sweep > Math.PI ? 1 : 0;
    const pathD = [
      `M ${x1} ${y1}`,
      `A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`,
      `L ${xi1} ${yi1}`,
      `A ${ir} ${ir} 0 ${large} 0 ${xi2} ${yi2}`,
      "Z"
    ].join(" ");
    return { ...d, pathD, pct };
  });

  return React.createElement("svg", { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
    slices.map(s => React.createElement("path", {
      key: s.name, d: s.pathD, fill: s.color, stroke: "white", strokeWidth: 1.5
    }))
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]         = useState("expenses");
  const [exp, setExp]         = useState(() => lsGet("exp_v4", DEF_EXP));
  const [acc, setAcc]         = useState(() => lsGet("ov_acc", DEF_ACC));
  const [fixed, setFixed]     = useState(() => lsGet("ov_fixed", DEF_FIXED));
  const [varExp, setVarExp]   = useState(() => lsGet("ov_var", DEF_VAR));
  const [recover, setRecover] = useState(() => lsGet("ov_recover", DEF_RECOVER));
  const [income, setIncome]   = useState(() => lsGet("ov_income", DEF_INCOME));
  const [month, setMonth]     = useState("2026-07");

  // Syncing & Firebase settings
  const [settings, setSettings] = useState(() => lsGet("aura_settings_v1", { syncKey: "", firebaseConfig: "" }));
  const [showSettings, setShowSettings] = useState(false);
  const [shareLinkState, setShareLinkState] = useState({ loading: false, link: "" });
  const [toast, setToast] = useState(null);

  // Sync status state: 'offline' | 'connecting' | 'synced' | 'syncing' | 'error'
  const [syncStatus, setSyncStatus] = useState("offline");
  // Highlight newly added items
  const [newlyAddedId, setNewlyAddedId] = useState(null);

  const lastRemoteData = useRef("");
  const firebaseSyncRef = useRef(null);
  const firebaseDbRef = useRef(null);

  const showToast = (message, type = "success") => {
    setToast({ message, type });
    setTimeout(() => setToast(null), 3500);
  };

  // Triggers highlighting of a newly added record
  const triggerGlow = (id) => {
    setNewlyAddedId(id);
    setTimeout(() => setNewlyAddedId(null), 1800);
  };

  // URL Hash loading checks (load configuration shares on mount)
  useEffect(() => {
    const hash = window.location.hash;
    if (hash && hash.startsWith("#config=")) {
      try {
        const base64Str = hash.replace("#config=", "");
        const decodedStr = atob(base64Str);
        const configObj = JSON.parse(decodedStr);
        if (configObj && configObj.settings) {
          setSettings(configObj.settings);
          lsSet("aura_settings_v1", configObj.settings);
          history.replaceState(null, "", window.location.pathname);
          showToast("Successfully loaded cloud sync settings!", "success");
        }
      } catch (e) {
        console.error("Failed to parse URL config sharing hash:", e);
        showToast("Invalid invite configuration hash.", "error");
      }
    }
  }, []);

  // Firebase Setup & Realtime DB Listening
  useEffect(() => {
    if (typeof firebase === "undefined") {
      setSyncStatus("offline");
      return;
    }

    const configStr = settings.firebaseConfig;
    const syncKey = settings.syncKey;

    if (firebaseSyncRef.current) {
      firebaseSyncRef.current.off();
      firebaseSyncRef.current = null;
    }
    firebaseDbRef.current = null;

    if (!configStr) {
      console.log("Firebase config not set. Offline mode.");
      setSyncStatus("offline");
      return;
    }

    try {
      const config = parseFirebaseConfig(configStr);
      if (!config) {
        setSyncStatus("error");
        showToast("Invalid Firebase configuration format.", "error");
        return;
      }
      if (!config.databaseURL) {
        setSyncStatus("error");
        showToast("Firebase Config: Missing 'databaseURL'.", "error");
        return;
      }

      setSyncStatus("connecting");

      // Re-initialize firebase app cleanly
      const initApp = () => {
        let app;
        if (firebase.apps.length > 0) {
          app = firebase.app();
        } else {
          app = firebase.initializeApp(config);
        }

        const db = firebase.database(app);
        firebaseDbRef.current = db;

        const resolvedKey = syncKey || (config.projectId ? config.projectId : "default");
        const ref = db.ref(`aura_expense_tracker/${resolvedKey}`);
        firebaseSyncRef.current = ref;

        showToast("⚡ Cloud Sync Active!", "success");
        setSyncStatus("synced");

        ref.on("value", snapshot => {
          const data = snapshot.val();
          if (data) {
            const dataStr = JSON.stringify(data);
            if (dataStr !== lastRemoteData.current) {
              lastRemoteData.current = dataStr;
              
              // Handle incoming cloud sync updates
              if (data.exp) setExp(data.exp);
              if (data.acc) setAcc(data.acc);
              if (data.fixed) setFixed(data.fixed);
              if (data.varExp) setVarExp(data.varExp);
              if (data.recover) setRecover(data.recover);
              if (data.income !== undefined) setIncome(data.income);
              
              setSyncStatus("synced");
              showToast("Cloud sync loaded latest updates!", "success");
            }
          } else {
            // Path is empty: write initial state to seed cloud
            const initialData = { exp, acc, fixed, varExp, recover, income };
            ref.set(initialData).then(() => {
              lastRemoteData.current = JSON.stringify(initialData);
              setSyncStatus("synced");
            });
          }
        }, err => {
          console.error("Firebase RTDB sync error:", err);
          setSyncStatus("error");
          showToast("Sync Error: " + err.message, "error");
        });
      };

      if (firebase.apps.length > 0) {
        firebase.app().delete().then(initApp).catch(initApp);
      } else {
        initApp();
      }

    } catch (e) {
      console.error("Firebase setup failed:", e);
      setSyncStatus("error");
      showToast("Firebase initialization failed.", "error");
    }

    return () => {
      if (firebaseSyncRef.current) {
        firebaseSyncRef.current.off();
      }
    };
  }, [settings]);

  // Synchronize state changes to local storage & Firebase DB
  useEffect(() => {
    const localData = { exp, acc, fixed, varExp, recover, income };
    const localStr = JSON.stringify(localData);

    lsSet("exp_v4", exp);
    lsSet("ov_acc", acc);
    lsSet("ov_fixed", fixed);
    lsSet("ov_var", varExp);
    lsSet("ov_recover", recover);
    lsSet("ov_income", income);

    if (firebaseDbRef.current && firebaseSyncRef.current) {
      if (localStr !== lastRemoteData.current) {
        setSyncStatus("syncing");
        firebaseSyncRef.current.set(localData).then(() => {
          lastRemoteData.current = localStr;
          setSyncStatus("synced");
        }).catch(err => {
          console.error("Failed to push changes to Firebase:", err);
          setSyncStatus("error");
        });
      }
    }
  }, [exp, acc, fixed, varExp, recover, income]);

  // Intercept and glow new items on array additions
  const prevExpLen = useRef(exp.length);
  useEffect(() => {
    if (exp.length > prevExpLen.current) {
      const added = exp[exp.length - 1];
      if (added && added.id) triggerGlow(added.id);
    }
    prevExpLen.current = exp.length;
  }, [exp]);

  const prevFixedLen = useRef(fixed.length);
  useEffect(() => {
    if (fixed.length > prevFixedLen.current) {
      const added = fixed[fixed.length - 1];
      if (added && added.id) triggerGlow(added.id);
    }
    prevFixedLen.current = fixed.length;
  }, [fixed]);

  const prevVarLen = useRef(varExp.length);
  useEffect(() => {
    if (varExp.length > prevVarLen.current) {
      const added = varExp[varExp.length - 1];
      if (added && added.id) triggerGlow(added.id);
    }
    prevVarLen.current = varExp.length;
  }, [varExp]);

  const prevRecoverLen = useRef(recover.length);
  useEffect(() => {
    if (recover.length > prevRecoverLen.current) {
      const added = recover[recover.length - 1];
      if (added && added.id) triggerGlow(added.id);
    }
    prevRecoverLen.current = recover.length;
  }, [recover]);

  const monthExp     = exp.filter(e=>mk(e.date)===month).sort((a,b)=>a.date<b.date?1:-1);
  const total        = monthExp.reduce((s,e)=>s+e.amount, 0);
  const bycat        = CATS.map(c=>({name:c.name,value:monthExp.filter(e=>e.category===c.name).reduce((s,e)=>s+e.amount,0),color:c.color})).filter(c=>c.value>0);
  const totalBal     = acc.reduce((s,a)=>s+a.balance, 0);
  const fixedPending = fixed.filter(f=>!f.paid).reduce((s,f)=>s+f.amount, 0);
  const varPending   = varExp.filter(v=>!v.paid).reduce((s,v)=>s+v.amount, 0);
  const allPending   = fixedPending + varPending;
  const toRecover    = recover.filter(r=>!r.recovered).reduce((s,r)=>s+r.amount, 0);
  const available    = totalBal - allPending;

  const handleOpenSettings = () => {
    setShareLinkState({ loading: false, link: "" });
    setShowSettings(true);
  };

  const handleSaveSettings = (newSettings) => {
    setSettings(newSettings);
    lsSet("aura_settings_v1", newSettings);
    setShowSettings(false);
    showToast("Sync settings updated!", "success");
  };

  const handleGenerateShareLink = async (targetSettings) => {
    setShareLinkState({ loading: true, link: "" });
    const configData = { settings: targetSettings };
    const base64Str = btoa(JSON.stringify(configData));
    const origin = window.location.origin + window.location.pathname;
    const fullUrl = `${origin}#config=${base64Str}`;

    let shortUrl = null;
    try {
      const resp = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(fullUrl)}`);
      if (resp.ok) {
        const text = await resp.text();
        if (text.startsWith("https://tinyurl.com/")) {
          shortUrl = text.trim();
        }
      }
    } catch (e) {
      console.warn("TinyURL request failed:", e);
    }

    setShareLinkState({ loading: false, link: shortUrl || fullUrl });
  };

  return React.createElement("div", { id:"root" },
    // Custom Toast Banner
    toast && React.createElement("div", {
      className: "toast-banner",
      style: {
        position: "fixed", top: 16, left: "50%", transform: "translateX(-50%)",
        background: toast.type === "success" ? "linear-gradient(135deg, #059669 0%, #0d9488 100%)" : "linear-gradient(135deg, #ef4444 0%, #dc2626 100%)",
        color: "white", padding: "10px 16px", borderRadius: 12, zIndex: 9999,
        fontSize: 12, fontWeight: 600, boxShadow: "0 8px 30px rgba(0,0,0,0.15)",
        textAlign: "center", width: "calc(100% - 32px)", maxWidth: 300
      }
    }, toast.message),

    React.createElement("div", { className:"scroll-area" },
      tab==="expenses"
        ? React.createElement(ExpTab, { month, setMonth, monthExp, total, bycat, setExp, onOpenSettings: handleOpenSettings, syncStatus, newlyAddedId, showToast })
        : React.createElement(OvTab, { acc, setAcc, fixed, setFixed, varExp, setVarExp, recover, setRecover, income, setIncome, monthlySpent:total, totalBal, fixedPending, varPending, allPending, available, toRecover, onOpenSettings: handleOpenSettings, syncStatus, newlyAddedId, showToast })
    ),

    React.createElement("nav", { className:"bottom-nav" },
      [
        { key:"expenses", label:"Expenses",  icon:"receipt"   },
        { key:"overview", label:"Overview",  icon:"dashboard" },
      ].map(({key,label,icon}) =>
        React.createElement("button", { key, className:"nav-btn "+(tab===key?"active":""), onClick:()=>setTab(key) },
          React.createElement(SvgIcon, { name:icon, size:20 }),
          React.createElement("span", null, label)
        )
      )
    ),

    // Sync Settings Modal
    showSettings && React.createElement(SettingsModal, {
      settings,
      onClose: () => setShowSettings(false),
      onSave: handleSaveSettings,
      onGenerateShareLink: handleGenerateShareLink,
      shareLinkState
    })
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
