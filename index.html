// ─── Mini Pie Chart (pure SVG) ───────────────────────────────────────────────
function PieChart({ data, size=160 }) {
  const total = data.reduce((s,d)=>s+d.value, 0);
  if (!total) return null;

  const cx = size/2, cy = size/2, r = size*0.38, ir = size*0.24;
  let angle = -Math.PI/2;
  const slices = data.map(d => {
    const pct = d.value / total;
    const sweep = pct * 2 * Math.PI;
    const x1 = cx + r * Math.cos(angle);
    const y1 = cy + r * Math.sin(angle);
    angle += sweep;
    const x2 = cx + r * Math.cos(angle);
    const y2 = cy + r * Math.sin(angle);
    const xi1 = cx + ir * Math.cos(angle);
    const yi1 = cy + ir * Math.sin(angle);
    angle -= sweep;
    const xi2 = cx + ir * Math.cos(angle);
    const yi2 = cy + ir * Math.sin(angle);
    angle += sweep;
    const large = sweep > Math.PI ? 1 : 0;
    const pathD = [
      `M ${x1} ${y1}`,
      `A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`,
      `L ${xi1} ${yi1}`,
      `A ${ir} ${ir} 0 ${large} 0 ${xi2} ${yi2}`,
      "Z"
    ].join(" ");
    return { ...d, pathD, pct };
  });

  return React.createElement("svg", { width: size, height: size, viewBox: `0 0 ${size} ${size}` },
    slices.map(s => React.createElement("path", {
      key: s.name, d: s.pathD, fill: s.color, stroke: "white", strokeWidth: 1.5
    }))
  );
}

// ─── ExpTab ──────────────────────────────────────────────────────────────────
function ExpTab({ month, setMonth, monthExp, total, bycat, setExp }) {

function App() {
  const [tab, setTab]         = useState("expenses");
  const [exp, setExp]         = useState(() => lsGet("exp_v4", DEF_EXP));
  const [acc, setAcc]         = useState(() => lsGet("ov_acc", DEF_ACC));
  const [fixed, setFixed]     = useState(() => lsGet("ov_fixed", DEF_FIXED));
  const [varExp, setVarExp]   = useState(() => lsGet("ov_var", DEF_VAR));
  const [recover, setRecover] = useState(() => lsGet("ov_recover", DEF_RECOVER));
  const [income, setIncome]   = useState(() => lsGet("ov_income", DEF_INCOME));
  const [month, setMonth]     = useState("2026-07");

  useEffect(()=>{ lsSet("exp_v4", exp); }, [exp]);
  useEffect(()=>{ lsSet("ov_acc", acc); }, [acc]);
  useEffect(()=>{ lsSet("ov_fixed", fixed); }, [fixed]);
  useEffect(()=>{ lsSet("ov_var", varExp); }, [varExp]);
  useEffect(()=>{ lsSet("ov_recover", recover); }, [recover]);
  useEffect(()=>{ lsSet("ov_income", income); }, [income]);

  const monthExp     = exp.filter(e=>mk(e.date)===month).sort((a,b)=>a.date<b.date?1:-1);
  const total        = monthExp.reduce((s,e)=>s+e.amount, 0);
  const bycat        = CATS.map(c=>({name:c.name,value:monthExp.filter(e=>e.category===c.name).reduce((s,e)=>s+e.amount,0),color:c.color})).filter(c=>c.value>0);
  const totalBal     = acc.reduce((s,a)=>s+a.balance, 0);
  const fixedPending = fixed.filter(f=>!f.paid).reduce((s,f)=>s+f.amount, 0);
  const varPending   = varExp.filter(v=>!v.paid).reduce((s,v)=>s+v.amount, 0);
  const allPending   = fixedPending + varPending;
  const toRecover    = recover.filter(r=>!r.recovered).reduce((s,r)=>s+r.amount, 0);
  const available    = totalBal - allPending;

  return React.createElement("div", { id:"root" },
    React.createElement("div", { className:"scroll-area" },
      tab==="expenses"
        ? React.createElement(ExpTab, { month, setMonth, monthExp, total, bycat, setExp })
        : React.createElement(OvTab, { acc, setAcc, fixed, setFixed, varExp, setVarExp, recover, setRecover, income, setIncome, monthlySpent:total, totalBal, fixedPending, varPending, allPending, available, toRecover })
    ),
    React.createElement("nav", { className:"bottom-nav" },
      [
        { key:"expenses", label:"Expenses",  icon:"receipt"   },
        { key:"overview", label:"Overview",  icon:"dashboard" },
      ].map(({key,label,icon}) =>
        React.createElement("button", { key, className:"nav-btn "+(tab===key?"active":""), onClick:()=>setTab(key) },
          React.createElement(SvgIcon, { name:icon, size:20 }),
          React.createElement("span", null, label)
        )
      )
    )
  );
}

// ─── Mount ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
